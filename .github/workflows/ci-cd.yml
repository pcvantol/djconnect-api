name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Wrangler deploy dry-run
        run: npx wrangler deploy --dry-run

      - name: Test
        run: npm test -- --run

      - name: Postman contract smoke test
        run: npm run postman:test

      - name: Staging-safe E2E smoke test
        run: |
          if [ -z "${DJCONNECT_RELAY_SECRET_VALUE:-}" ]; then
            echo "Skipping staging-safe E2E smoke test because DJCONNECT_RELAY_SECRET is not configured as a GitHub Actions secret."
            echo "Set it to the same value as the Cloudflare Worker DJCONNECT_RELAY_SECRET to enable proof -> token -> register -> event CI coverage."
            exit 0
          fi
          npm run smoke:e2e
        env:
          DJCONNECT_RELAY_SECRET_VALUE: ${{ secrets.DJCONNECT_RELAY_SECRET }}

      - name: Secret pattern scan
        run: |
          set -euo pipefail
          matches="$(rg -n "BEGIN PRIVATE KEY|AuthKey|DJCONNECT_RELAY_SECRET=|APNS_PRIVATE_KEY=|Bearer [A-Za-z0-9]|ghp_|sk-|spotify_refresh|refresh_token|device_token" . || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            disallowed="$(printf '%s\n' "$matches" | grep -Ev 'src/apns\.ts|worker-configuration\.d\.ts|AGENTS\.md|CONTRIBUTING\.md|DEVELOPMENT_ENVIRONMENT\.md|\.github/workflows/ci-cd\.yml' || true)"
            if [ -n "$disallowed" ]; then
              echo "Disallowed secret-like pattern found." >&2
              exit 1
            fi
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply remote D1 migrations
        run: npx wrangler d1 migrations apply djconnect_api --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test
        run: curl --fail --silent --show-error https://api.djconnect.dev/health

      - name: Postman contract smoke test
        run: npm run postman:test
