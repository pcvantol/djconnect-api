name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@78852b8f714981794c63b92ff0d3083d06516099
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-api

  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency and tool freshness report
        run: |
          node --version
          npm --version
          npx wrangler --version
          npm run deps:report

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Wrangler deploy dry-run
        run: npx wrangler deploy --dry-run

      - name: Validate D1 migrations
        run: npx wrangler d1 migrations apply djconnect_api --local

      - name: Test
        run: npm test -- --run

      - name: Generate post-merge coverage evidence
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run test:coverage
          printf '%s\n' "$GITHUB_SHA" > coverage-main-sha.txt

      - name: Upload post-merge coverage evidence
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: api-cobertura-coverage
          path: |
            coverage/cobertura-coverage.xml
            coverage-main-sha.txt
          if-no-files-found: error

      - name: Local E2E contract smoke
        run: npm run test:e2e

      - name: Postman contract smoke test
        run: npm run postman:test

      - name: Secret pattern scan
        run: |
          set -euo pipefail
          matches="$(rg -n "BEGIN PRIVATE KEY|AuthKey|DJCONNECT_RELAY_SECRET=|APNS_PRIVATE_KEY=|Bearer [A-Za-z0-9]|ghp_|sk-|spotify_refresh|refresh_token|device_token" . || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            disallowed="$(printf '%s\n' "$matches" | grep -Ev 'src/apns\.ts|worker-configuration\.d\.ts|AGENTS\.md|CONTRIBUTING\.md|DEVELOPMENT_ENVIRONMENT\.md|\.github/workflows/ci-cd\.yml' || true)"
            if [ -n "$disallowed" ]; then
              echo "Disallowed secret-like pattern found." >&2
              exit 1
            fi
          fi

  cleanup-workflow-runs:
    name: Cleanup old workflow runs
    needs:
      - validate
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete old completed workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          KEEP_RUNS: 2
        run: |
          set -euo pipefail

          current_workflow_id="$(gh api "repos/${REPOSITORY}/actions/runs/${CURRENT_RUN_ID}" --jq '.workflow_id')"
          workflow_ids="$(gh api "repos/${REPOSITORY}/actions/workflows" --paginate --jq '.workflows[].id')"

          for workflow_id in ${workflow_ids}; do
            keep_limit="${KEEP_RUNS}"
            if [ "${workflow_id}" = "${current_workflow_id}" ]; then
              keep_limit="$((KEEP_RUNS - 1))"
            fi

            mapfile -t run_ids < <(
              gh api "repos/${REPOSITORY}/actions/workflows/${workflow_id}/runs?status=completed&per_page=100" \
                --paginate \
                --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id'
            )

            if [ "${#run_ids[@]}" -le "${keep_limit}" ]; then
              continue
            fi

            for index in "${!run_ids[@]}"; do
              run_id="${run_ids[$index]}"
              if [ "${index}" -lt "${keep_limit}" ] || [ "${run_id}" = "${CURRENT_RUN_ID}" ]; then
                continue
              fi

              echo "Deleting completed workflow run ${run_id} for workflow ${workflow_id}"
              gh api \
                --method DELETE \
                "repos/${REPOSITORY}/actions/runs/${run_id}"
            done
          done
