name: Deploy API production

on:
  workflow_dispatch:
    inputs:
      action:
        description: Bounded Platform Release action.
        required: true
        type: choice
        options: [deployment]
      candidate_sha:
        description: Qualified exact main SHA to deploy.
        required: true
        type: string
      execution_mode:
        description: Deployment execution mode.
        required: true
        type: choice
        options: [execute]
      manifest_id:
        description: Qualified Platform Release manifest identifier.
        required: true
        type: string
      platform_version:
        description: Platform Major.Minor version.
        required: true
        type: string
      release_profile:
        description: Authorized release profile.
        required: true
        type: choice
        options: [INTERNAL_RELEASE]

permissions:
  contents: read

concurrency:
  group: api-production-deployment
  cancel-in-progress: false

jobs:
  validate-release-dispatch:
    name: Validate qualified deployment dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 1
      - name: Validate bounded internal release request
        env:
          ACTION: ${{ inputs.action }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          set -euo pipefail
          test "$ACTION" = deployment
          test "$EXECUTION_MODE" = execute
          test "$RELEASE_PROFILE" = INTERNAL_RELEASE
          printf '%s' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s' "$PLATFORM_VERSION" | grep -Eq '^[0-9]+\.[0-9]+$'
          printf '%s' "$MANIFEST_ID" | grep -Eq '^release-[A-Za-z0-9._-]+$'
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"

  deploy:
    name: Deploy qualified API candidate
    needs: validate-release-dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_DJCONNECT_RELAY_SECRET: ${{ secrets.DJCONNECT_RELAY_SECRET != '' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Apply remote D1 migrations
        run: npx wrangler d1 migrations apply djconnect_api --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Verify deployed health endpoint
        run: curl -fsS https://api.djconnect.dev/health
      - name: Run staging-safe smoke E2E
        if: env.HAS_DJCONNECT_RELAY_SECRET == 'true'
        run: npm run smoke:e2e
        env:
          DJCONNECT_RELAY_SECRET_VALUE: ${{ secrets.DJCONNECT_RELAY_SECRET }}
      - name: Produce deployment evidence
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          python - <<'PY'
          from datetime import UTC, datetime
          import json, os
          with open("platform-release-deployment-evidence.json", "w", encoding="utf-8") as file:
              json.dump({"schema_version": 1, "kind": "api_production_deployment", "repository": os.environ["GITHUB_REPOSITORY"], "candidate_sha": os.environ["CANDIDATE_SHA"], "manifest_id": os.environ["MANIFEST_ID"], "platform_version": os.environ["PLATFORM_VERSION"], "release_profile": os.environ["RELEASE_PROFILE"], "health": "PASS", "status": "PASS", "timestamp": datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z")}, file, sort_keys=True)
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: platform-release-deployment-evidence
          path: platform-release-deployment-evidence.json
          if-no-files-found: error
