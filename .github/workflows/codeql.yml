name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@78852b8f714981794c63b92ff0d3083d06516099
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-api

  codeql:
    uses: pcvantol/djconnect/.github/workflows/djconnect-codeql-ci.yml@78852b8f714981794c63b92ff0d3083d06516099 # Repaired reachable workflow closure
    with:
      languages: javascript-typescript
