name: Deploy API Worker release artifact

on:
  workflow_dispatch:
    inputs:
      action: {required: true, type: choice, options: [deployment]}
      candidate_sha: {required: true, type: string}
      execution_mode: {required: true, type: choice, options: [execute]}
      manifest_id: {required: true, type: string}
      artifact_id: {required: true, type: string}
      artifact_sha256: {required: true, type: string}
      target: {required: true, type: choice, options: [cloudflare_workers_production]}
      platform_version: {required: true, type: string}
      release_profile: {required: true, type: choice, options: [INTERNAL_RELEASE]}

permissions:
  actions: read
  contents: read

concurrency:
  group: api-worker-production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate manifest-bound deployment request
        env:
          ACTION: ${{ inputs.action }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          set -euo pipefail
          test "$ACTION" = deployment
          test "$EXECUTION_MODE" = execute
          test "$TARGET" = cloudflare_workers_production
          test "$RELEASE_PROFILE" = INTERNAL_RELEASE
          printf '%s' "$CANDIDATE_SHA" | grep -Eq '^[0-9a-f]{40}$'
          printf '%s' "$MANIFEST_ID" | grep -Eq '^release-[A-Za-z0-9._-]+$'
          printf '%s' "$ARTIFACT_ID" | grep -Eq '^[0-9]+$'
          printf '%s' "$ARTIFACT_SHA256" | grep -Eq '^[0-9a-f]{64}$'
          printf '%s' "$PLATFORM_VERSION" | grep -Eq '^[0-9]+\.[0-9]+$'
      - name: Verify target deployment readiness
        uses: pcvantol/djconnect/.github/actions/deployment-readiness-preflight@962609ad77668c615b00c88b22167ed6b20bffc3
        with:
          target: ${{ inputs.target }}
          manifest_id: ${{ inputs.manifest_id }}
          candidate_sha: ${{ inputs.candidate_sha }}
          artifact_id: ${{ inputs.artifact_id }}
          artifact_sha256: ${{ inputs.artifact_sha256 }}
          expected_runner_os: Linux
          expected_runner_arch: X64
          required_configuration: READINESS_CLOUDFLARE_API_TOKEN
          smoke_contract: api-worker-post-deployment-health-v1
        env:
          READINESS_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Require approved central operational manifest source
        shell: bash
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
        run: |
          set -euo pipefail
          manifest="$(mktemp)"
          trap 'rm -f "$manifest"' EXIT
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/pcvantol/djconnect/main/docs/release/PLATFORM_3_3_CURRENT_MAIN_MANIFEST_PROPOSAL.json \
            --output "$manifest"
          test "$(jq -r '.status' "$manifest")" = APPROVED_DEPLOYMENT_DISPATCH_PENDING
          test "$(jq -r '.approval.state' "$manifest")" = APPROVED
          test "$(jq -r '.manifest_id' "$manifest")" = "$MANIFEST_ID"
          test "$(jq -r '.release_profile' "$manifest")" = "$RELEASE_PROFILE"
          jq -e --arg sha "$CANDIDATE_SHA" \
            '.repositories[] | select(.repository == "pcvantol/djconnect-api" and .source_sha == $sha)' \
            "$manifest" >/dev/null
          jq -e --arg target "$TARGET" --arg artifact "$ARTIFACT_ID" --arg sha "$ARTIFACT_SHA256" \
            '.artifact_bindings[] | select(.target == $target and (.artifact_id | tostring) == $artifact and .artifact_sha256 == $sha)' \
            "$manifest" >/dev/null
      - id: artifact
        name: Verify immutable artifact provenance
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          set -euo pipefail
          metadata="$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}")"
          test "$(jq -r '.expired' <<<"$metadata")" = false
          run_id="$(jq -r '.workflow_run.id' <<<"$metadata")"
          run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")"
          test "$(jq -r '.conclusion' <<<"$run")" = success
          test "$(jq -r '.head_branch' <<<"$run")" = main
          test "$(jq -r '.head_sha' <<<"$run")" = "$CANDIDATE_SHA"
          test "$(jq -r '.name' <<<"$run")" = 'API release artifact'
          printf 'run_id=%s\n' "$run_id" >> "$GITHUB_OUTPUT"
      - name: Download immutable API artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          artifact-ids: ${{ inputs.artifact_id }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact.outputs.run_id }}
          path: artifact
      - name: Deploy exact bundled Worker and migrations
        env:
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t release_artifacts < <(find artifact -type f -name djconnect-api-release.tar.gz -print)
          test "${#release_artifacts[@]}" -eq 1
          release_artifact="${release_artifacts[0]}"
          test "$(sha256sum "$release_artifact" | awk '{print $1}')" = "$ARTIFACT_SHA256"
          mkdir release
          tar -xzf "$release_artifact" -C release
          cd release/release
          test -f bundle/index.js
          test -f wrangler.jsonc
          test -d migrations
          npm ci --ignore-scripts
          ./node_modules/.bin/wrangler d1 migrations apply djconnect_api --remote --config wrangler.jsonc
          ./node_modules/.bin/wrangler deploy bundle/index.js --no-bundle --config wrangler.jsonc
      - name: Publish redacted deployment evidence
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          MANIFEST_ID: ${{ inputs.manifest_id }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
          ARTIFACT_SHA256: ${{ inputs.artifact_sha256 }}
          TARGET: ${{ inputs.target }}
          PLATFORM_VERSION: ${{ inputs.platform_version }}
          RELEASE_PROFILE: ${{ inputs.release_profile }}
          DEPLOYMENT_WORKFLOW_RUN: ${{ github.run_id }}
        run: |
          python - <<'PY'
          from datetime import UTC, datetime
          import json, os
          with open("api-worker-deployment-evidence.json", "w", encoding="utf-8") as file:
              json.dump({"schema_version": 1, "kind": "api_worker_production_deployment", "repository": os.environ["GITHUB_REPOSITORY"], "candidate_sha": os.environ["CANDIDATE_SHA"], "manifest_id": os.environ["MANIFEST_ID"], "artifact_id": os.environ["ARTIFACT_ID"], "artifact_sha256": os.environ["ARTIFACT_SHA256"], "target": os.environ["TARGET"], "platform_version": os.environ["PLATFORM_VERSION"], "release_profile": os.environ["RELEASE_PROFILE"], "deployment_workflow_run": os.environ["DEPLOYMENT_WORKFLOW_RUN"], "deployment_result": "DEPLOYED_PENDING_SMOKE", "timestamp": datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z")}, file, sort_keys=True)
          PY
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: api-worker-deployment-evidence
          path: api-worker-deployment-evidence.json
          if-no-files-found: error
